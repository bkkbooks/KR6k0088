body:
  text: 後學雲棲寺沙門袾宏述恭誦發隱語語放光言釋迦之欲言發天台之未發精透處夢士頓醒懇切處石人下淚音圓旨遠信法寶之神珠事核詞工誠青囊之妙藥敢不欽奉又何異同妄現魔身輒爾饒舌指玉體而問瘡疣知其失眼向金錍而求抉剔意在復明伏惟發人天有賴匇匇草草冀恕其狂湻熙稽首一問齋戒交神姬孔之大法垂戒訓俗聖王之宏規今學者已遵三戒謂色鬬得兼體四毋謂意必固我則終身可行一心無累況五經五行各符五戒為出假菩薩之所修習如天台智者之所稱揚亦已至矣何必背儒童之教束護明之律耶答儒釋禁戒大略相似而疏密不同如五戒一曰不殺謂絕無所殺也而儒止言無故不殺牛羊犬豕不言不殺止言釣不綱弋不宿不言不釣弋是知儒戒成世間善佛戒成出世間善儒受佛戒自古有之無足異者且出假菩薩先曾入真既從真而假則世出世間隨所欲行罔弗如意不背儒童兼持佛律亦復何礙二問道藏既竊佛藏則道戒亦同佛戒矣受彼金科猶吾梵網犯他青律即我吉羅雖淨明塗炭北斗太微例若小乘似難槩取餘固宜任之也答道之為戒與世律似遠而實同與佛律似近而實異葢天上天下統御之勢不殊世出世間聖凡之分逈別且道戒雖亦止惡行善要其所歸惟是藉靜養而固氣潛神積功行而留形住世是以持道戒則飛昇九霄持佛戒乃超出三界梵網金科不可同日語明矣三問大明律令監前代之科條聖祖聰明晰人情之隱伏王難烈於地獄見報速於來生奈何不遵又敷別戒答現報者今世之殃來生則苦輪無盡王難者色身之慘地獄則慧命俱沈況政刑止懲治凡民在世道尚為末務而梵網正成全開士於佛教尤屬大乘不可同日語又明甚矣四問舊戒出無佛之世名為尸羅性戒本當人之心不拘持受必受則滋五陰之稠林從新又廣眾生之異見固當寂寂安取紛紛答若高談無佛之世直論當人之心則不但老瞿曇絕口毗尼優波離羞稱羯磨即使束五部置之高閣褫三衣懸之樹端未足為過如或不然法林惟恐不稠正見惟患不廣耳何紛紛之足厭五問持如空之戒相龐老斥為迷人能觀空而得道天台許其具足具足已超智讚自在迷人豈異缺破雜穿而又云空見擾心破其定共空心邪僻壞我律儀將安取衷不流惡見且經云若有得空者終不破於戒復何指耶答空有二契真空則萬法俱備何須更習毗尼墮頑空則眾善皆隳豈不有傷戒品執莽蕩輕軌儀其失大矣六問發心許破戒大乘容犯戒此或與其能權恣其攝化耳乃若持陀羅尼者已為具戒持了義經者已為具戒習禪定者能救四重五逆之違戒則一定一慧反在式叉之先一呪一文足省堅持之力矣豈各有宗旨歟答發心菩薩持戒之心過於聲聞百千萬億倍安有許容破犯之理良繇菩薩見機行權利生益物不狥故跡暗合成規似破非破正持戒之極也走杖不云叛父引裾豈曰慢君亦忠孝之極也若夫經呪之齊戒力則亦如來隨時偏讚因事特標說法之常規耳故時而崇律百行總隸毗尼時而尚禪萬法皆趣正受主賓互換機實雙流不可拘常輒生異議若據一代時教門庭則因戒生定因定發慧自是不易常法七問在家出家何取形迹得無所得安問後先欲表淨戒輒言早離塵緣將䇿深心因示壯年成道佛語足證前史難憑可得作此解否答略形迹泯後先此理論則然耳既已示現同凡則誕生有時出家有日成道有候說法有期烏容混耶非身現身身必擬於常形非時現時時必合乎世歷且孔曰儒童老曰迦葉亦示現耳然而昌平李下函谷杏壇始末端繇歷歷可指即其例也八問無心犯戒既從末減求末減者皆學無心不簡不覊任情任意習忘而真忘似非故作如夢而復夢應是業因答故求末減減則不能纔學無心心便成有如斯犯戒罪烏可逃真修行人自不應爾九問佛心喜捨取其物者稱其心劫事堪懲掠其剩者減其罪此乃上求下化胡為與盜同科若以法身觀劫物即佛物佛物即世物時時為盜那得不犯答佛無吝物之意而偷盜者自爾成愆父本愛子為懷而忤逆者必然獲罪理應如是佛亦何心若夫取劫賊物則有二別出慈心者無過而且多功出貪心者比例而均作盜質之經疏有定論矣十問荸荷猪驅豕就屠示定業而殺輪且止吉祥佛列俎受享分罪報而冤氣將沈大烹以養聖賢聖賢能使烹者不怨是或解冤之道意亦菩薩之權答菩薩之現殺則所謂剝割斬剉而未嘗惱害一微細生靈者也聖賢之享烹則所謂食是大夫祿不食是大夫福者也果能殺而無害方可行權若知福有所歸自宜慎口方丈萬錢智者不為矣十一問一心一切心一切心一心一心一切戒一戒一切心一切心一戒一切戒一心而曰何戒定出何心似為不徧按經第一輕戒則標孝順心慈心十三謗毀戒則標孝順心慈悲心之類蓋宜標而標何須補入耶答總觀心地本體則體惟一念本自圓成細析心地法門則門有萬殊不妨分屬故云三十心者皆一毛頭也復以一二分屬戒相者毛頭之上更出毛頭也譬天王雖名大主亦應列任六曹六曹猶未徧周豈不重開百職經始標某心某心者六曹之謂也今復增某心某心者百職之謂也如取義之相近亦令餘可例推便初學易知簡行在智者神融意會而已十二問心地自合理心地自得宜佛性之性是人性之性佛性常住是人性常住為當先從心地發光佛性起用何理不合何事不宜奚必斂睫而借目於迦文按圖而索驥於戒本資他五十八寶用盡則貧隱己千百億珠漫藏無益耶答心雖體含萬法賴致方知地雖種具千華乘時乃發笑貧人之借寶不知善用則富室可成羨力士之懷珠不知莫指則奇珍竟隱然則圖非是驥識驥必假良圖眼不屬人因人能開瞖眼即心為戒因盡理之玄談因戒攝心實救病之良藥也烏可忽諸十三問不顯不誓不習學佛我則昏矣僻教僻說不化眾生人則昏矣以其昏昏使人昏昏豈止倚肆而酤何異指佛而謗但名輕垢實所未知答不誓不願等非全不知進道也勇猛之心未發則美業難成僻教僻說等非全不知利物也引導之方未精則化功莫就不開重過止列微愆固有繇矣十四問出家之法不向國王禮拜而求法不向父母禮拜而求法法不在六親不必敬法不在鬼神不必禮但知法師語可信有百里千里向之禮拜而求法者法師云云當作如是釋也今疏曰率土之濵皆王臣民無二王即世尊矣可不拜乎經曰護佛戒如事父母四眾下座如孝順父母矣可不拜乎又大經廣孝道而慢親大眾首國王而慢君果稱佛旨否乎假令君父受戒成道拜之豈便損福不然以佛禮佛是常不輕何須辨而又辨如東林遠乎答僧之為名名曰出家僧之為道道曰出世出家則不當拘以家人父子之規出世則不當局以世法君臣之禮蓋是君父敬佛而及彼僧徒決非僧徒恃佛而慢於君父若夫道在君父而禮自名禮道眾生即佛而禮自名禮佛斯亦無不可者其在今日當如之何亦隨時而已時以佛法為重優容我等曰勿拜則遵內教可也時以人倫為重定為成式曰當拜則遵王制可也此何所據薩婆多論云比丘違王制者得罪諸經要集謂愚人妄行法教展轉教他不聽禮父母尊親此不合聖意反招無知之罪經論屢開斯足據耳然則遠祖非歟曰爾時拜禮未定下僧俗議而遠正論不阿理應如是何過之有十五問是戒也受之者必其有心有情犯之者等於木石木頭矣又云一切地水是我先身一切火風是我本體亦得傳戒及乎先身受法逮乎本體歟美人草聽歌按節或是婬緣生公石聞經點頭寧無佛性請得度之答地水火風之說止是發明物我稟同痛癢機一故殺他即是殺己殺畜無殊殺人也豈謂木石類均解思惟修假使聖僧再講石前未必不成強項狂客重歌草畔豈能更學敲檀若夫一人發真虗空消殞乃至無情說法無情作佛歷有明文又云若人識得心大地無寸土土既即心水火與風亦如是矣本來成佛何以度為十六問看病信屬孝慈之心然我身亦是聖賢之器念盲龜逗孔之不易思扁鵲洞垣之為難肯施無益之撫摩用染必死之疫癘凡菩薩人應知方便答福田無上仁人固以看病為先慧海多門智者寧無保身之哲或親己或使人或用財或効力皆可也釋尊運兜羅而愈疾撫摩未必無功孔兒處危地以全身疫癘何能必染蓋是救人為急欲罷不能非比冐難故行可已不已且古之悲田今之養濟皆聖主良臣看病之大慈也豈必以吮疽按癩為救療嘗藥哺食為慇懃耶前頁孔兒戒疏事義中作庾襄事存考十七問賣男女而供眾鬻弟子而行慈彼為法來安忍貨取設彼菩提已發是我輕垢罪成道人而可以輕販南詢之士寒心父母而隨之覓求受供之人同獄一何無善巧至此乎答古人懇語垂訓危言示誠有其辭則然而其實不盡然者感恩之極而曰銘肌刻骨豈真有事錐刀攄衷之至而曰瀝膽披肝未必掀翻臟腑就使捨身為法竭命尊賢亦大士之常法耳攜妻挈子而事梵志九男二女而養耕夫古有高模今無繼跡云爾十八問善慧自稱大士誌公自表觀音溫陵反戒焚身大慧曲求蔭姪皆犯輕戒乃得重名豈各有合理處耶答塵中凡士或可常評格外奇人毋容迹論初生而指天指地不妨我是如來將死而默囑默傳何礙自名菩薩預稱慈氏遠指圓通奚不可者且溫陵善發藥王隱義自不唐棄色身杲老不減臨濟宗風豈得未除恩愛蓋宜晦則晦宜彰則彰或守經常或行權變不應以自讚毀他共視豈得以違理犯法同條者哉十九問五夏以前專精戒律五夏以後聽教參禪此通小乘非指大器今乃六時時誦疑防教門禪門當是一法融通無間心地性地乎防或疑妨字存考答非常大器過量圓人既不拘夏後夏前自相應即小即大纔持戒品已達教相全文正受毗尼便悟禪宗妙旨建立則繁興萬法不礙六時掃蕩則屏絕纖塵奚存一念遠公常禮有定永明自行不虧豈被小根故為細事凡我後學願各深思二十問佛心徹於三際大光滿於十方豈不知經入支那法流震旦香油辛味並沿五印之土風戒品律儀未盡九州之垢罪憎之則謗任之則寬佛隴南山既爾闕然儒典王章似應相濟答佛心雖徹三際救弊則姑據一時佛光雖滿十方取信則專從本土待夫時至遠被自合比例旁通是以儒典王章似難並用情宜勢便豈病雙行法固與世相推禮亦憑義可起或曰毗尼與脩多羅異譬世律令制自一人舍利目連所不得與然雖如是金口洪音凡夫贊片辭而莫得衮衣寸缺巧者補一線以何妨神而化之與民宜之學佛者不可不知也二十一問經稱國賊如操懿溫莽之流為國賊使命是亦國賊也或是戒其從逆否如下文言又似降虜之人矣答使命者非必為賊使命也通二國之情合兩軍之戰危彼社稷害彼人民故云約與國戰必克今之所謂良臣古之所謂民賊也二十二問盜聽說戒力士之杵冥加廣施經文惡人之目難掩得無相礙願折羣疑答說戒者非平日講說之說蓋半月誦說之說也凡半月共行布薩乃眾僧自舉愆尤示彼惡流必生異謗故惟除國主不許餘人若夫布衍經文宣揚義趣又何過焉薦導先亡祓除患難皆曰至心讀誦不聞掩帙祕藏以此利人正契佛心是名法施前問答竟僧俗雜問發隱成周咨大眾於時緇素善友各陳所見合從者從之義未顯者為略辯如左法喜之樂當何如也一問經疏鈔如祖父子混合不分似為不可答此行布圓融義也祖不是父父不是子行布義也祖父子孫交參共濟圓融義也織錦而聯綴千絲調羮而合和五味味不可分而具足絲不可析而自明蓋此經是華嚴流類天真父子非異非同幸毋以常格局之二問科經之例總別相對今初曰總明大意次合對別乃並列四科或恐未安答總別相對多種不同有一總一別對者誠如所問有一總對二別者對三別四別者其對均也楞嚴要解敘聽眾初總標二嘆德三列名是一總對二別也華嚴玄談初總序名意二歸敬請加三開章釋文四謙讚迴向是一總對三別也今列四科亦一總對三別也若據華嚴即總即別又安可以數量局之三問文中經論所載戒相多種傳記所辯受法不同經論蓋指地持瓔珞等傳記蓋指梵網本乃至制旨本今解似不合此答若指梵網六本為受法則下文良繇機悟偏圓義即不成何以故梵網六本誰授偏機者誰授圓機者當知此六是登壇授戒羯磨儀式隨意可用其云傳記所辯自是諸書雜集中論議發揮戒法詳略乃隨機耳豈有壇上正羯磨時分別偏圓各各為說耶四問等覺中初曰觀達無明源底邊際二曰斷最後微細無明三曰與無明父母別而妙覺中但曰無所斷者名無上士則知無明至等覺悉已斷盡云何教義謂十地斷四十品無明又破一品名等覺又破一品名妙覺共破四十二品二義皆出智者稍似不同若為融會答等覺無明已盡然存有所斷亦是無明并斷俱無名為更斷是知等覺斷惑妙覺斷斷能斷斷者方名永斷諸無明也故斷四十二品而入妙覺也五問梵網單喻何以言人法喻答梵網是喻菩薩戒是人法合而言之故曰人法喻也又問何得輒立經名噫稱讚不可思議功德佛護念經什師易云佛說阿彌陀經夫彌陀聖號人所樂聞名以義起易之無不可者大師易梵網曰菩薩戒亦此意也今合而言之非有增也何不可之有六問疏云煩惱常有故不說障次云輕業不障輕報不障皆指障戒今說不障真性何也答不障真性出其繇也繇不障性故不障戒也此三障名自古所有原非指戒疏乃引用意云煩惱障不障戒耳良繇輕業彰於身口中人亦易為防煩惱起於一心智者猶或難免此而障戒盡天下無人得受戒矣故特明之七問論興廢中第三亦云爾時恒興爾時即廢今曰常興鮮廢何也答此文當以出入恒有一句為興後入勝定道時隨勝得名者明入時非無因殊勝定道暎蔽戒名其實有也下則明其退緣言必須退定道時乃廢及聲聞盡壽菩薩成道乃廢耳如世人謂至死方休明無休時也據華嚴常恒說熾然說無間說有興無廢亦何礙也八問戒師五德一持戒二十臘三解律藏四通禪思五慧藏通玄而地持云必須戒德嚴明善解三藏今謂具二缺三然戒德嚴明必具臘矣律詮戒經詮定論詮慧善解三藏必具定慧矣恐無缺焉答下文不云乎或可以戒該臘以慧該定則不具而具似缺非缺隱然五德不必問也但不直曰五德而曰可該者意自有在若直以戒為久臘則新學暫持者必輕宿德耆年若直以解為三學則世智辯聰者便謂真禪實慧且疏中何不槩云解律藏解經藏解論藏而必曰禪思必曰窮玄豈特解義云乎哉後地持本受戒式中解云亦五德意亦之為言即前該意也又問解不兼臘何得復云能誦則臘久答半月半月積誦不休豈非久臘若專言解聰利少年昨日登壇今日能講何必久臘九問燈明喻舍那無待論矣妙海在家菩薩而與蓮華並稱波勒因地未終而曰釋迦為侶夫傳法大任必屬出家極果世尊不侔因地以斯相比固所未安答舍那授法妙海不說妙海授法釋迦況僧俗者迹也菩薩道中何以迹礙雙林俗士說法王庭祇園比丘傾心丈室亦奚不可若波勒者德擬迦文斯名等侶何必三十二相樹下成道毫髮相似不然趙州古佛仰山小釋迦曹溪嶺南有佛出世亦皆非耶堯曰如天天之侶也老曰猶龍龍之侶也豈堯果穹窿上覆老真夭矯青雲耶據華嚴初發心時便成正覺波勒不可以侶迦文何子自待之淺十問宗趣總別舉宗遺趣其義云何又心地為宗此宗是趣良以心地為宗則無所趣故答賢首五門姑據般若心經未及餘經彼中原只舉宗而兼趣意如華嚴玄談云此經因果緣起理實法界以為宗趣亦宗趣兼說也且語之所尚曰宗宗之所歸曰趣意謂立此為宗令趣何所不謂宗更宗他也此經心地為宗止惡行善以歸心地即是趣意正合華嚴宗趣兼說之旨蓋圓教宗趣互用無定或舉因為宗令得果為趣或舉果為宗令修因為趣因該果徹如玄談中說十一問乳味判教亦有說乎答據三聚出方等可判生酥而自古五時結經原以梵網華嚴判歸乳味良繇此經從心出一切法喻從乳出酪酥醍醐也又佛最初結戒喻牛最初出乳也又涅槃最後之訓不離乎戒喻醍醐最後之味不離乎乳也十二問諸經皆有當機此經何以不列聽眾答不列當機者此經是一切菩薩所同學無一非機也必論當機則釋釋自是當機故不說也十三問華表因實表果今供舍那之華何不表因答因果宛然諸君自不察耳此經以心地為宗無一法不從心地中流無一法不還歸心地者菩薩萬行若非出自一心還歸一心即不名佛因不名佛果今此華出舍那心地表菩薩從自心中出無量因行還以此華供養彼佛表還以自心因行成自心果佛也據華嚴因該果徹不離因果不落因果拈來無一物不可供佛舉起無一法不可為因若執華必表因非圓教義何以故有時華表因實表果開華後乃結實故有時實表因華表果種核後乃生華故有時定因慧果淨極光通故有時慧因定果惑破心安故惡可一途而取一格而論乎十四問體性虗空華光三昧既入三昧何有華光而云任運自現答如來妙定非動非靜而常動靜非出非入而常出入此三昧號體性虗空虗對實故使體性不虗當如山不納山石不容石一頑定耳體本虗空故華光任現豈以既入三昧便應灰滅不生圓覺經如來入大光明藏三昧而現起淨土與十二大士更相詶答抑又何也且三昧有百千萬億等名不是一味寂靜故有三昧二乘尚不聞其名菩薩猶未解其義而執泥寂靜則師子奮迅師子頻呻等皆成喧鬧矣又問諸三昧皆有出入何獨此中而說出入答出入非難自在為難二乘斂念方入起念方出不名自在隨心自在乃稱妙定也據華嚴即入即出依報正報交互圓融不可思議此特其小小者耳何足為異十五問佛言吾今來此八千返表法而已云何實說答若據表法門中句句字字無非表者若據示現作則就令實說何妨蓋佛所說經無一法不事理雙融表實兼具言表則必有實舉實則表在中此之往返得無疑駭以為多耶老子尚無世不出雲門乃三作國王此皆實有不是表法何獨如來八千之返便無其事且如來重重往返既純表非實華嚴重重法界亦純表非實耶空華佛事水月道場法性光中萬轉千迴事出平常全無奇特何疑何駭又問科云橫指處會今十處則不及餘方豎明往復今八千則未周塵劫何名如來悲願之廣答此謂借有盡彰無盡也讚佛曰萬德萬豈盡佛號民曰百姓百豈盡民雖曰十處八千即是橫無涯際豎無終窮也十六問疏稱蓮華二義處濁不污譬舍那居穢不染以喻彰德止成一義云何二義答二義者一則華必處濁不處高原譬佛示居穢土不居淨土也一則華雖處濁而不污譬佛居穢土而不染也十七問古解經者各有所宗今解此經當宗何者如別有所宗不應依就台疏如都無所宗則是汗漫臆說願為剖示答此有三句一曰本宗二曰兼宗三曰無宗言本宗者即禪宗故此宗即是心為宗故心者群經之祖萬法之源心地二字攝菩薩戒無弗盡故又此心即是大華嚴故言兼宗者達心之士不但缾環釵釧色色皆金亦復草木瓦礫無非金者阿含小教外道偏門善巧用之悉成圓義何況台教依而就之誰謂不可以我心宗發彼義疏台之為教不出心故如必硬豎剎竿各不相下喻如同胞兄弟而互相害大忤逆故言無宗者覓心體相不可得故常為心宗不宗心故故云併所謂心地者亦不可得也又問既云禪宗又云華嚴華嚴五教禪居頓位頓之去圓未達一間何得並舉答清涼讚天台四教理致圓備而五教加頓補台之備而未備也以達磨一宗無可安著聊判歸頓而實頓有二義一但頓二圓頓此禪宗正圓頓之頓然何以不名為圓良繇專重直指見性以破漸宗於法界緣起之義雖具在中而非所重救時為急無暇論故如阿伽陀藥雖有輕骨之能療病為急無暇論故不可遂謂無斯能也又此宗本曰教外別傳則小乘大乘一切乘所不能收四教五教一切教所不能攝不惟出彼漸階亦復不居頓格非但超乎頓位亦復不受圓名賢首判頓亦不得已而姑為寄位云爾豈可真以位分拘耶十八問達磨西來既號傳法正宗何得台宗不與傳燈之列為是高過禪宗為是未稱直指答此有二義一者天台教觀起自前故中論一偈教觀所宗慧文傳之南嶽南嶽傳之智者達磨未來人已修習特繇智者乃大闡耳二者天台教觀猶屬教故達磨一宗教外直指纔說教觀早曲了也是以教觀雖極玄妙不出教乘中事耳台教不與禪宗以是之故非台教立法有未善也十九問內戒外刑道俗各別內書外典權實迥殊何得博引九經巧附五罰又教而不改教者何尤此里塾之言春風沂水鼓瑟自娛此狂夫之態不宜引入以亂聖經答法華謂治世語言資生業等皆與實相不相違背當知無書不可援引且釋迦親為教主而六群調達終不可化將無教者之尤耶又止謂鼓瑟不礙賢人何曾道菩薩必須鼓瑟幸惟逆志毋但執辭二十問經稱釋迦從華嚴沒於閻浮出乃十處說法是先生人間後升天宮說法也又云入天宮說魔受化經已下生閻浮是先於天宮說法後生人間也二說若為融會答據華嚴雙垂兩相則知佛體本來無二眾生所見不同既能兩相雙垂豈不能兩時雙示謂天宮說法後降人間亦可謂人間成佛後升天宮亦可謂天宮說法已後生人間還升天宮說法亦可謂人間天上一時成佛說法亦可圓融之說渾先後以何妨無間之談通古今而一息不必執文而失理也二十一問頌中俱來至我所鈔云表體皆歸一心夫心即是體無攝體歸心之理答心行對說則心為體行為用單舉一心則常寂常照常寂體也常照用也體用歸一心猶言體在是用在是也不可泥歸字而疑攝體歸心也且太極靜而生陰動而生陽太極之說未盡至理尚雙具動靜豈應舍那心地不通體用若心專屬體則與用成對待何名一心三觀而為中道第一諦乎二十二問孝順父母以及至道當分四境不應科勝因勝果答分四境亦有此說今當以大師所科為正若分四境何不直言孝順父母師僧三寶至道而復於至道上加孝順二字況三寶之中已有法矣豈三寶中法猶未盡道而別有至道之法所當孝順耶故前三屬因至道屬果二十三問討罪國有明條殺人經無顯證琉璃滅釋佛何不誅調達害兄佛何故縱今言有罪而殺殺何犯焉妄害生靈違佛規訓古云外道入佛法中必破滅佛法斯其驗歟願釋所惑答見機得殺本之疏文疏文本之佛說非臆見也夫沙門專慈悲之業王臣主生殺之權發隱分別明甚今謂佛是沙門類耶王臣類耶何得引琉璃調達而證不殺且王臣殺戒非特與沙門殊亦復與庶民異殺有罪而成犯是王臣終無受戒之日矣故珪禪師為嶽神授戒不禁其行殺也惟禁其濫刑及無辜也不禁其取財也惟禁其威福求享祀也不禁其婚娶也惟禁其羅欲乖大倫也不禁其語言也惟禁其虗妄違天心也不禁其飲宴也惟禁其沈湎敗正事也如斯說法是謂逐機隨緣而不踰矩千變萬化而不離心逆順雙宜僧俗兩利上符千聖下濟羣生噫人人作如是外道佛法其長隆乎二十四問君父之讐必報此權教也內經出權教隳安得復引陳恒趙盾之迹違釋迦智者之言無論王臣想當悉禁答儒者不喜佛法正為此等何怪乎古今謗僧曰無父無君耶且孔子尚不得討陳恒則世之亂臣賊子惟恐人不受菩薩戒何以故受戒者堅則行惡者便是菩薩戒者亂之資也佛法圓妙世出世間融通不滯而迂人執之其禍至此可勝嘆哉餘發隱中已反覆推明茲不復贅二十五問暎燈影而授戒見日光而撤壇密示暗傳夜聚曉散不使人增惑耶答朝至尊以五鼓祀宣聖以清宵未聞其增惑也孟氏謂夜氣清明登師云白日喧雜願合而觀之二十六問遊戲翰墨何損毗尼如可如解應有別愆非關詩畫若休若永未聞墮落可遽譏評必欲箇箇盧能但恐人人獬豸決目而名淨目迷心而曰淨心哀哉空王出假無日答非謂詩必白癩畫必泥棃也詩畫無救乎二人之難見為僧者當學道不當雜學云爾噫果是即境明心推餘濟物則逢場作戲無所不可如或未然惟恐你不放下心閉却眼若肯人人決目箇箇迷心敢保五眼圓明千靈洞徹在且菩薩出假則弘施六度萬行普度九有四生而徒咏月題花圖山繪水明道之功不切兼利之化何成至哉天人師不出如是假二十七問經中謂鐵鎚碎身終不以破戒之身受人禮拜今有愧戒德之難全望弟子而觸禮已出下䇿何名上人答無德而揣己自卑正遵佛制欺世而罔尊自大乃叛聖謨非上人且免罪人出下䇿猶勝無䇿然雖如是亦有其地彌高其心彌下者不輕位證菩薩而徧禮四眾莫須戒德難全夏禹身任國王而亟拜昌言應是多過自赧良繇權實初無定法低昂各有攸宜時當居正位以作後學之司南則慈明安坐而納展可也時當崇厚道以覺狂夫之我慢則藏師俯僂而避拜亦可也妙用無恒固未可輕議也二十八問千華佛親自說經一切人盡得受戒惟除七逆誰列三層莫引權文礙彼圓器又謂在家者亦必先受五戒而經中列位數次皆首王臣意者王臣容可直受答層樓喻出金口善戒律非小乘縱彼圓機須遵定制如必直受亦有方便不壞次第而得直受一日之內先受五戒隨受菩薩戒是也若出家者亦一日內先受十戒隨受具戒及菩薩戒名雖直受不越次故豈獨王臣僧俗一切皆可行也二十九問佛戒盡必然之辭發隱倡不必然之說若云無執何用堅持如為奴事眾割肉飼鷹等皆實有之而曰不必然何也答不必然言不必定然非決不然也何也奉佛而必為奴則蒼生無君主濟物而必割肉則初學無完膚法師而必講經則廢法華五種日食而必三兩則類何曾萬錢於今人中而必無讖為師則賢者竟無師於今時中而必奉祠得度則貧者終不度不必然者此類是也有此不必然其必然者乃可常然無此不必然則必然者窮矣窮則變變則通通則久世出世間一也三十問居士時亦講經還可傳戒作師否答此在自度儒而悟佛道不妨為天下僧人師僧而明聖學不妨為天下儒人師如其不然業有專攻門庭各別修齊治平之術應屬素王羯磨布薩之儀還歸緇侶耳三十一問未受戒者皆名惡人近則沙彌比丘驚蒙斯號遠則堯舜周孔濫被斯名隋煬超文景之先房融軼姚宋之上實所未喻答此有二義一者對待義未受戒善者皆名為惡猶未登聖地者皆名為凡非兇惡之惡也又佛法每勝世法世間之善人在佛法中猶名惡世間之聖人在佛法中猶名凡也二者激勵義不受戒即惡明戒必不可不受也據斯二義然則堯舜周孔雖不受戒不失為世間聖人隋君房相使終持戒又豈但超文景軼姚宋而已哉三十二問圓悟高菴分曹樹黨兩家各統門徒二老安得無與即今鬬爭堅固良繇長老含容彌勒久滯求名時師未免好勝莫護先賢之短應開後學之迷答藺相如尚忍私讐劉元城不失和氣彼圓悟高菴繼祖傳燈代佛揚化猶有這箇在何名那畔人是將以丹朱慢遊而罪帝堯無義方冉求聚斂而譏孔子非善教否耶是將以六羣亂德二眾分河而謂釋迦未免好勝否耶雖然容有主張正論而扶末法報佛恩者又不可避小嫌而迷大體也菩薩無惡名怖豪傑之士思之三十三問一家教觀三諦釋經相沿至今訖無異說乃云疏主自不執法豈是門人妄啟他途夫中道勝法相去幾許而以此譏章安荊溪又何怪人之刺溫陵長水耶答不執法者謂通法而不滯非謂廢法而不用也疏云凡菩薩勝法皆名第一義凡之一字語意自明無可疑者且三諦者其原起於佛說豈真天台倡說其說通於諸家豈真天台一家耶故法法皆諦諦諦皆三不言三諦亦具三諦正不必盡將經論一字一句定判三諦却似編排三諦當差非通人之論是名執法發隱第四十一輕垢中已反覆推明請更詳覽又章安荊溪亦不執法亦無可譏展轉後來各立門庭分別太甚乃成拘礙耳寧止二公溫陵長水焉可刺也夫古人固無盡勝今人之理今人亦無決不及古人之理即有微瑕平懷商確何所不可但不宜探疵索釁惟恐不深如讐家搆訟窮呵極詆惟恐不快如醉漢罵街則世衰之相法滅之徵也可弗戒歟附事義三戒四毋論語云君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在鬪及其老也血氣既衰戒之在得子絕四毋意毋必毋固毋我無故不殺禮記曰君無故不殺牛大夫無故不殺羊士無故不殺犬豕不綱不宿論語云釣而不綱弋弋不射宿走杖不叛禮子為父責小杖則受大杖則走引裾豈慢宋童貫與中丞盧航表裡為姦縉紳側目右正言陳禾上疏劾貫怙寵弄權之罪論奏未終帝拂衣起禾引帝衣請畢其說衣裾落帝曰正言碎朕衣矣禾曰陛下不惜碎衣臣豈惜碎首以報陛下驅豕就屠宋太平興國中僧辯聰游五臺山寺寺之上座僧老為眾輕易聰獨敬事之將還京師老僧附聰書使於城北尋勃荷投之聰辭去竊發而觀無他詞但曰度眾生畢早來早來若更強住却恐造業聰即還於廣濟河側聞小兒呼勃荷聰問勃荷何在小兒指大豬豬項串金環臥街西牆下聰扣牆問屠誰氏曰趙生家也問此何名曰勃荷唯食勃荷故吾日烹千百豬豬奔逸難驅以此豬引導之則纍纍就死畜之十五年矣聰以書投之勃荷忽人立而化兜羅愈疾報恩經云佛在竹園精舍有一比丘身患惡瘡眾所惡賤如來往至房中伸兜羅緜手為之摩洗身瘡皆愈危地全身晉庾襄晉武帝咸寧中大疫二兄俱亡次兄玭復危殆癘氣方熾父母兄弟皆出次於外襄獨留不去諸父兄強之乃曰襄性不畏病乃親自扶持晝夜不眠十有餘旬疫勢既歇家人乃反玭病得痊襄亦無恙父老咸曰異哉此子守人所不能守行人所不能行歲寒然後知松柏之後凋始知疫癘之不能染也自稱大士傅大士曰我得首楞嚴定天嘉二年感七佛相隨釋迦引前維摩接後惟釋迦數顧共語為我補處也自表觀音寶誌禪師帝嘗詔畫工張僧繇寫師像僧繇下筆輒不自定師遂以指剺面門分披出十二面觀音相或慈或威或定或慧僧繇竟不能寫反戒焚身溫陵曰若識見未亡諸蘊違礙不達法行空慕其迹是徒增業苦為妄作之凶矣故律制燒身燃指悉皆得罪曲求蔭姪如天猶龍孔子曰唯天為大唯堯則之又曰老子其猶龍乎分河西域性相二宗分河飲水異色立幟
